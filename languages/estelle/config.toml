name = "Estelle"
grammar = "estelle"
path_suffixes = ["este"]
line_comments = ["// "]
tab_size = 4
hard_tabs = true

brackets = [
  { start = "{", end = "}", close = true, newline = true },
  { start = "[", end = "]", close = true, newline = false },
  { start = "(", end = ")", close = true, newline = false },
  { start = "\"", end = "\"", close = true, newline = false, not_in = ["string", "comment"] },
  { start = "'", end = "'", close = true, newline = false, not_in = ["string", "comment"] },
]

completion_query_characters = [".", ":"]

[overrides.string]
completion_query_characters = []

[overrides.comment]
completion_query_characters = []
